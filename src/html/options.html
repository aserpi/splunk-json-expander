<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../css/options.css" />
  </head>
  <body>
    <form>
      <div class="general-options">
        <div class="settings-group">
          <label for="maxLevel">
            <span class="bold">Expansion level</span>
            <input type="number" id="maxLevel" min="0" max="25" />
          </label>
          <p class="helper-text">
            The number of nested levels to be expanded in each pass (0 for all).
          </p>
        </div>
      </div>
    </form>

    <script type="module" src="../js/options.js"></script>
  </body>
</html>
