<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../css/options.css" />
  </head>
  <body>
    <form>
      <div class="general-options">
        <div class="settings-group">
          <label for="autoExpansionLevel">
            <span class="bold">Auto-expansion level</span>
            <input type="number" id="autoExpansionLevel" min="1" />
          </label>
          <p class="helper-text">
            The number of nested levels to be expanded automatically on page
            load (leave empty for all).
          </p>
        </div>
        <div class="settings-group">
          <label for="manualExpansionLevel">
            <span class="bold">Manual expansion level</span>
            <input type="number" id="manualExpansionLevel" min="1" />
          </label>
          <p class="helper-text">
            The number of nested levels to be expanded when clicking the
            extension icon (leave empty for all).
          </p>
        </div>
      </div>
    </form>

    <script type="module" src="../js/options.js"></script>
  </body>
</html>
